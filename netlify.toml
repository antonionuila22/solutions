[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # These server-side secrets are intentionally inlined by Vite into the SSR
  # bundle. They are NOT exposed to the client — only used in serverless functions.
  SECRETS_SCAN_OMIT_KEYS = "TURSO_AUTH_TOKEN,TURSO_DATABASE_URL,RESEND_API_KEY,RESEND_FROM_EMAIL,CONTACT_RECIPIENT_EMAIL"

# ===========================================
# ASTRO BUNDLED ASSETS (with content hashes)
# Maximum caching - these files never change
# ===========================================

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    CDN-Cache-Control = "public, max-age=31536000, immutable"

# ===========================================
# STATIC ASSETS - Fonts (1 year, immutable)
# ===========================================

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    CDN-Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    CDN-Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ===========================================
# IMAGES - Max 24h caching
# ===========================================

# Icons directory (SVGs, favicons)
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"
    CDN-Cache-Control = "public, max-age=86400"

# Photos directory
[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"
    CDN-Cache-Control = "public, max-age=86400"

# Image formats
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.avif"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.gif"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

# ===========================================
# DOCUMENTS & DATA
# ===========================================

[[headers]]
  for = "/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=86400"

# ===========================================
# SEO FILES
# ===========================================

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=86400"

# ===========================================
# HTML PAGES - Short cache with background revalidation
# Allows fast loads while keeping content fresh
# ===========================================

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=60, stale-while-revalidate=60"
    CDN-Cache-Control = "public, max-age=60, stale-while-revalidate=60"
    # Preload critical resources: fonts first, then CSS
    Link = '''
      </fonts/Poppins-Regular.woff2>; rel=preload; as=font; type=font/woff2; crossorigin,
      </fonts/Poppins-SemiBold.woff2>; rel=preload; as=font; type=font/woff2; crossorigin
    '''

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=60, stale-while-revalidate=60"
    CDN-Cache-Control = "public, max-age=60, stale-while-revalidate=60"

# High-traffic pages
[[headers]]
  for = "/contact"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=60, stale-while-revalidate=60"
    CDN-Cache-Control = "public, max-age=60"

[[headers]]
  for = "/services/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=60, stale-while-revalidate=60"
    CDN-Cache-Control = "public, max-age=60"

[[headers]]
  for = "/blog/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=60, stale-while-revalidate=60"
    CDN-Cache-Control = "public, max-age=60"

# ===========================================
# SECURITY & PERFORMANCE HEADERS - All pages
# ===========================================

[[headers]]
  for = "/*"
  [headers.values]
    # Security
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net https://analytics.ahrefs.com https://assets.calendly.com; style-src 'self' 'unsafe-inline' https://assets.calendly.com; img-src 'self' data: https://www.googletagmanager.com https://www.google-analytics.com https://www.facebook.com https://analytics.ahrefs.com; connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://analytics.ahrefs.com https://connect.facebook.net https://www.facebook.com; frame-src https://calendly.com https://www.facebook.com https://www.googletagmanager.com; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Permitted-Cross-Domain-Policies = "none"

    # Performance hints
    X-DNS-Prefetch-Control = "on"

# ===========================================
# PRECONNECT & PRELOAD for external resources
# ===========================================

[[headers]]
  for = "/"
  [headers.values]
    Link = '''
      <https://fonts.googleapis.com>; rel=preconnect,
      <https://fonts.gstatic.com>; rel=preconnect; crossorigin,
      <https://www.googletagmanager.com>; rel=preconnect
    '''

# ===========================================
# API & DYNAMIC ROUTES - No caching
# ===========================================

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    CDN-Cache-Control = "no-store"

# ===========================================
# NETLIFY FUNCTIONS
# ===========================================

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ===========================================
# REDIRECTS (if needed)
# ===========================================

# Example: Redirect www to non-www
# [[redirects]]
#   from = "https://www.codebrand.us/*"
#   to = "https://codebrand.us/:splat"
#   status = 301
#   force = true

[[redirects]]
  from = "/desarrollo-web-honduras"
  to = "/hn/desarrollo-web-honduras"
  status = 301
  force = true

[[redirects]]
  from = "/work"
  to = "/projects"
  status = 301
  force = true
